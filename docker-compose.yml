version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: channer-postgres
    environment:
      POSTGRES_USER: channer
      POSTGRES_PASSWORD: channer
      POSTGRES_DB: channer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U channer"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: channer-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/moehans-official/channer-backend:latest
    container_name: channer-backend
    environment:
      ENVIRONMENT: production
      SERVER_ADDRESS: :8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: channer
      DB_PASSWORD: channer
      DB_NAME: channer
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      REDIS_DB: 0
      JWT_SECRET: channer-jwt-secret-change-in-production
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/moehans-official/channer-frontend:latest
    container_name: channer-frontend
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
